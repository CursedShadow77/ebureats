<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EburEats</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#00c853,#00e5ff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:white;
  padding:30px;
  border-radius:20px;
  width:350px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
  margin-top:0;
}

input{
  width:90%;
  padding:12px;
  margin:6px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:95%;
  padding:14px;
  margin:6px;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

.green{
  background:#00c853;
  color:white;
}

.red{
  background:#ff5252;
  color:white;
}

.blue{
  background:#2962ff;
  color:white;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="card">

<div id="loginBox">

<h1>🚴 EburEats</h1>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Hasło">
  
<input id="accountName" placeholder="@NazwaKonta">

<input id="playerName" placeholder="Nazwa gracza">
  
<button class="green" id="register">
Rejestracja
</button>

<button class="blue" id="login">
Logowanie
</button>

</div>

<div id="userBox" class="hidden">

<h1>🚴 EburEats</h1>

<p id="status"></p>

<button class="green">
Wejdź do gry
</button>

<button class="red" id="logout">
Wyloguj
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyCa0garyFJS753hYnB3IPubS8U1jv1p5RE",
authDomain:"ebureats.firebaseapp.com",
projectId:"ebureats",
storageBucket:"ebureats.firebasestorage.app",
messagingSenderId:"219158643334",
appId:"1:219158643334:web:70d4aa86f5825674038707"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

register.onclick = async ()=>{

try{
await createUserWithEmailAndPassword(
auth,
email.value,
password.value
);

alert("Konto utworzone!");
}
catch(err){
alert(err.message);
}

};

login.onclick = async ()=>{

try{
await signInWithEmailAndPassword(
auth,
email.value,
password.value
);

alert("Zalogowano!");
}
catch(err){
alert(err.message);
}

};

logout.onclick = async ()=>{
await signOut(auth);
};

onAuthStateChanged(auth,user=>{

if(user){

loginBox.classList.add("hidden");
userBox.classList.remove("hidden");

document.getElementById("status").innerText =
"Zalogowany jako: " + user.email;

}else{

loginBox.classList.remove("hidden");
userBox.classList.add("hidden");

}

});

</script>

</body>
</html>
