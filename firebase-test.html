<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EburEats</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#00c853,#00e5ff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:white;
  padding:30px;
  border-radius:20px;
  width:350px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
  margin-top:0;
}

input{
  width:90%;
  padding:12px;
  margin:6px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:95%;
  padding:14px;
  margin:6px;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

.green{
  background:#00c853;
  color:white;
}

.red{
  background:#ff5252;
  color:white;
}

.blue{
  background:#2962ff;
  color:white;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="card">

<div id="loginBox">

<h1>🚴 EburEats</h1>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Hasło">
  
<input id="accountName" placeholder="@NazwaKonta">

<input id="playerName" placeholder="Nazwa gracza">
  
<button class="green" id="register">
Rejestracja
</button>

<button class="blue" id="login">
Logowanie
</button>

</div>

<div id="userBox" class="hidden">

<h1>🚴 EburEats</h1>

<p id="status"></p>

  <div id="gameMenu" class="hidden">

<button class="green" id="startButton">Zaczynamy</button>

<button class="blue" id="profileButton">Profil</button>

<button class="blue" id="rankingButton">Ranking</button>

<button class="blue" id="shopButton">Sklep</button>

<button class="red" id="endButton">
Koniec na razie
</button>
    
</div>

  <div id="profileScreen" class="hidden">

<h2>👤 Profil</h2>

<p id="profileData"></p>

<button class="red" id="backProfile">
Powrót
</button>

</div>

  <div id="rankingScreen" class="hidden">

<h2>🏆 Ranking</h2>

<p id="rankingData">
Ładowanie...
</p>

<button class="red" id="backRanking">
Powrót
</button>

</div>

  <div id="shopScreen" class="hidden">

<h2>🛒 Sklep</h2>

<p>
💎 Premium 2 - 100 monet<br>
💎 Premium 3 - 250 monet<br>
🏅 Złota odznaka - 500 monet
</p>

<button class="red" id="backShop">
Powrót
</button>

</div>

  <div id="waitingScreen" class="hidden">

<h2>📦 Poczekalnia</h2>

<p id="waitingText">
Oczekiwanie na zamówienie...
</p>

<button class="red" id="cancelWaiting">
Powrót
</button>

</div>

  <div id="orderScreen" class="hidden">

<h2>📦 Nowe zamówienie</h2>

<p id="orderData"></p>

<button class="green" id="acceptOrder">
Przyjmij
</button>

<button class="red" id="rejectOrder">
Odrzuć
</button>

</div>

  <div id="deliveryScreen" class="hidden">

<h2>🚴 Dostarczanie</h2>

<p id="deliveryText">
Trwa dostawa...
</p>

</div>

  <div id="deliveryCompleteScreen" class="hidden">

<h2>✅ Dostawa ukończona</h2>

<p id="deliveryReward"></p>

<button class="green" id="backToMenu">
Powrót do menu
</button>

</div>

<button class="green" id="playButton">
Wejdź do gry
</button>

<button class="red" id="logout">
Wyloguj
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCa0garyFJS753hYnB3IPubS8U1jv1p5RE",
authDomain:"ebureats.firebaseapp.com",
projectId:"ebureats",
storageBucket:"ebureats.firebasestorage.app",
messagingSenderId:"219158643334",
appId:"1:219158643334:web:70d4aa86f5825674038707"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;

register.onclick = async ()=>{

try{
const userCredential =
await createUserWithEmailAndPassword(
auth,
email.value,
password.value
);

await setDoc(
doc(db,"users",userCredential.user.uid),
{
email: email.value,
accountName: accountName.value,
playerName: playerName.value,
coins: 0,
completedOrders: 0,
rejectedOrders: 0,
xpLevel: 1,
premiumLevel: 1
}
);

alert("Konto utworzone!");
}
catch(err){
alert(err.message);
}

};

login.onclick = async ()=>{

try{
await signInWithEmailAndPassword(
auth,
email.value,
password.value
);

alert("Zalogowano!");
}
catch(err){
alert(err.message);
}

};

logout.onclick = async ()=>{
await signOut(auth);
};

onAuthStateChanged(auth, async user => {

if(user){

currentUser = user;
  
loginBox.classList.add("hidden");
userBox.classList.remove("hidden");

const userDoc = await getDoc(
doc(db,"users",user.uid)
);

const data = userDoc.data();

document.getElementById("status").innerHTML =
`
Witaj, ${data.playerName}<br>
Konto: @${data.accountName}<br>
Monety: ${data.coins}<br>
Ukończone zamówienia: ${data.completedOrders}<br>
Odrzucone zamówienia: ${data.rejectedOrders}<br>
Poziom XP: ${data.xpLevel}<br>
Poziom Premium: ${data.premiumLevel}
`;
  
}else{

loginBox.classList.remove("hidden");
userBox.classList.add("hidden");

}

});

playButton.onclick = () => {

document.getElementById("gameMenu")
.classList.remove("hidden");

playButton.style.display = "none";

};

endButton.onclick = () => {

document.getElementById("gameMenu")
.classList.add("hidden");

playButton.style.display = "block";

};

profileButton.onclick = () => {

document.getElementById("status").style.display = "none";

playButton.style.display = "none";

document.getElementById("profileScreen")
.classList.remove("hidden");

document.getElementById("profileData").innerHTML =
document.getElementById("status").innerHTML;

document.getElementById("gameMenu")
.classList.add("hidden");

};

backProfile.onclick = () => {

document.getElementById("profileScreen")
.classList.add("hidden");

document.getElementById("gameMenu")
.classList.remove("hidden");

document.getElementById("status").style.display = "block";

};

rankingButton.onclick = async () => {

document.getElementById("gameMenu")
.classList.add("hidden");

document.getElementById("rankingScreen")
.classList.remove("hidden");

const snapshot = await getDocs(
collection(db,"users")
);

let ranking = [];

snapshot.forEach(doc => {

ranking.push(doc.data());

});

ranking.sort(
(a,b) => b.coins - a.coins
);

let html = "";

ranking.forEach((player,index)=>{

html +=
`${index+1}. ${player.playerName} - ${player.coins} monet<br>`;

});

document.getElementById("rankingData")
.innerHTML = html;
  
};

backRanking.onclick = () => {

document.getElementById("rankingScreen")
.classList.add("hidden");

document.getElementById("gameMenu")
.classList.remove("hidden");

  };

  shopButton.onclick = () => {

document.getElementById("gameMenu")
.classList.add("hidden");

document.getElementById("shopScreen")
.classList.remove("hidden");

};

backShop.onclick = () => {

document.getElementById("shopScreen")
.classList.add("hidden");

document.getElementById("gameMenu")
.classList.remove("hidden");

};

const pickupPoints = [
"Dino",
"Żabka",
"Spółdzielnia Transportu Wiejskiego (STW)",
"Plac Zabaw",
"Słowicza 15",
"Strusia 30",
"Diamentowa 1",
"Wierzbowa 32A",
"Łochowska 38",
"Staroszkolna 10"
];

const deliveryPoints = [
"Sokola 62",
"Bielika 10",
"Jastrzębia 18",
"Sokola 7",
"Ptasia 23",
"Żurawia 32",
"Łabędzia 10",
"Czysta 10",
"Granitowa 4",
"Bażancia 16",
"Kolibra 11",
"Drozda 13",
"Perłowa 10",
"Wierzbowa 9",
"Rajska 2",
"Wierzbowa 35A",
"Łochowska 55",
"Jastrzębia 46A",
"Łochowska 3",
"Łochowska 18"
];
  
  startButton.onclick = () => {

document.getElementById("gameMenu")
.classList.add("hidden");

document.getElementById("waitingScreen")
.classList.remove("hidden");

const waitTime =
2;

document.getElementById("waitingText")
.innerHTML =
`Nowe zamówienie pojawi się za około ${waitTime} sekund`;

setTimeout(() => {

document.getElementById("waitingScreen")
.classList.add("hidden");

document.getElementById("orderScreen")
.classList.remove("hidden");

const pickup =
pickupPoints[Math.floor(Math.random() * pickupPoints.length)];

const delivery =
deliveryPoints[Math.floor(Math.random() * deliveryPoints.length)];

document.getElementById("orderData")
.innerHTML =
`
${pickup} → ${delivery}

<br><br>

1 moneta
`;

}, waitTime * 1000);

};

acceptOrder.onclick = async () => {

document.getElementById("orderScreen")
.classList.add("hidden");

document.getElementById("deliveryScreen")
.classList.remove("hidden");

const deliveryTime =
Math.floor(Math.random() * 11) + 5;

document.getElementById("deliveryText")
.innerHTML =
`🚴 Dostarczanie zamówienia...<br><br>${deliveryTime} s`;

setTimeout(async () => {

const userRef =
doc(db,"users",currentUser.uid);

const userDoc =
await getDoc(userRef);

const data =
userDoc.data();

const reward = data.completedOrders + 1;

await updateDoc(userRef,{
coins: data.coins + reward,
completedOrders: data.completedOrders + 1
});

document.getElementById("deliveryScreen")
.classList.add("hidden");

document.getElementById("deliveryCompleteScreen")
.classList.remove("hidden");

document.getElementById("deliveryReward")
.innerHTML =
`💰 Otrzymano ${reward} monet!`;
}, deliveryTime * 1000);

};
  
rejectOrder.onclick = async () => {

const userRef =
doc(db,"users",currentUser.uid);

const userDoc =
await getDoc(userRef);

const data =
userDoc.data();

await updateDoc(userRef,{
rejectedOrders: data.rejectedOrders + 1
});

alert("Zamówienie odrzucone");

location.reload();

};

  backToMenu.onclick = () => {

location.reload();

};
  
cancelWaiting.onclick = () => {

document.getElementById("waitingScreen")
.classList.add("hidden");

document.getElementById("gameMenu")
.classList.remove("hidden");

};
  
</script>

</body>
</html>
