<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EburEats Firebase Test</title>
</head>
<body>

<h1>Firebase Test</h1>

<input id="email" placeholder="Email">
<br><br>

<input id="password" type="password" placeholder="Hasło">
<br><br>

<button id="register">Rejestracja</button>
<button id="login">Logowanie</button>

<p id="status">Niezalogowany</p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCa0garyFJS753hYnB3IPubS8U1jv1p5RE",
  authDomain: "ebureats.firebaseapp.com",
  projectId: "ebureats",
  storageBucket: "ebureats.firebasestorage.app",
  messagingSenderId: "219158643334",
  appId: "1:219158643334:web:70d4aa86f5825674038707"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("register").onclick = async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("Konto utworzone!");
  }
  catch(err) {
    alert(err.message);
  }
};

document.getElementById("login").onclick = async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("Zalogowano!");
  }
  catch(err) {
    alert(err.message);
  }
};

onAuthStateChanged(auth, user => {

  if(user) {
    document.getElementById("status").innerText =
      "Zalogowany: " + user.email;
  }
  else {
    document.getElementById("status").innerText =
      "Niezalogowany";
  }

});

</script>

</body>
</html>
